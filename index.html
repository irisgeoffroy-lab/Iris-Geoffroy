  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris Geoffroy — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #ffffff;
        --card-bg: #f8f8f8;
        --text-primary: #000000;
        --text-secondary: #555555;
        --accent-red: #cc0000;
        --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
      }

      html {
        scroll-behavior: smooth;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Jost', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        line-height: 1.5;
        overflow-x: hidden;
      }

      @media (pointer: fine) {
        body, a, button, input, textarea, select {
          cursor: none !important;
        }
      }

      .reveal-hidden {
        opacity: 0;
        transform: translateY(50px);
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform;
      }
      
      .reveal-visible {
        opacity: 1;
        transform: translateY(0);
      }

      #root {
        width: 100%;
        min-height: 100vh;
      }
    </style>
